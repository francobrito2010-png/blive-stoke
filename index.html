<!doctype html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#0a0a0c"/>
  <title>B'LIVE Stock</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{background:#000;color:#f4f4f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
    :root{--red:#dc2626;--red-dim:rgba(220,38,38,.15);--amber:#f59e0b;--amber-dim:rgba(245,158,11,.1);--green:#10b981;--card:rgba(255,255,255,.025);--border:rgba(255,255,255,.07)}
    button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit}
    input{font-family:inherit;outline:none}

    /* HEADER */
    #header{padding:32px 20px 20px;border-bottom:1px solid rgba(220,38,38,.2);background:radial-gradient(ellipse 120% 80% at 50% 0%,rgba(220,38,38,.25),transparent 60%),#0a0a0c}
    .logo-row{display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:8px;font-size:22px;font-weight:900;text-transform:uppercase;letter-spacing:.04em}
    .logo span{color:var(--red)}
    .lang-btn{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:6px 12px;background:rgba(255,255,255,.05);color:#d4d4d8}
    .subtitle{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#71717a;margin-top:4px;margin-left:30px}
    .section-title{font-size:18px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;margin-top:20px}
    .red-bar{width:48px;height:3px;background:var(--red);border-radius:2px;margin-top:6px}
    .stats{display:flex;gap:12px;margin-top:16px}
    .stat{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 12px}
    .stat-num{font-size:24px;font-weight:700;line-height:1.1}
    .stat-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#71717a;margin-top:2px}
    .stat.amber{background:var(--amber-dim);border-color:rgba(245,158,11,.25)}
    .stat.amber .stat-num{color:var(--amber)}
    .stat.amber .stat-label{color:rgba(245,158,11,.7)}

    /* STICKY NAV */
    #nav{position:sticky;top:0;z-index:10;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.04);padding:10px 16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .nav-btn{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;border-radius:10px;padding:10px 4px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:#d4d4d8;display:flex;align-items:center;justify-content:center;gap:5px}
    .nav-btn.active{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.35);color:var(--amber)}
    .nav-btn.red{background:var(--red);border-color:var(--red);color:#fff}

    /* SECTIONS */
    .section{padding:12px 16px}

    /* COLLAPSE HEADER */
    .collapse-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;cursor:pointer;user-select:none}
    .collapse-title{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:900;text-transform:uppercase;letter-spacing:.04em}
    .collapse-count{font-size:11px;color:#71717a}

    /* ROWS */
    .item-row{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px;transition:border-color .2s}
    .item-row.low{border-color:rgba(245,158,11,.4)}
    .item-row.out{border-color:rgba(220,38,38,.5)}
    .item-left{flex:1;min-width:0}
    .item-name{font-size:18px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .item-name.low{color:var(--amber)}
    .item-name.out{color:var(--red)}
    .item-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
    .badge{font-size:10px;font-weight:700;text-transform:uppercase;padding:2px 7px;border-radius:20px}
    .badge.low{background:rgba(245,158,11,.12);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
    .badge.out{background:rgba(220,38,38,.12);color:#f87171;border:1px solid rgba(220,38,38,.3)}
    .min-row{display:flex;align-items:center;gap:4px;font-size:10px;color:#71717a}
    .mini-btn{width:18px;height:18px;border-radius:4px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);font-size:12px;display:flex;align-items:center;justify-content:center;color:#71717a}
    .trash-btn{color:#52525b;font-size:14px;padding:4px;background:none;border:none}
    .trash-btn:active{color:var(--red)}
    .qty-controls{display:flex;align-items:center;gap:10px;flex-shrink:0}
    .qty-num{font-size:24px;font-weight:900;width:46px;text-align:center;line-height:1}
    .circle-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#fff;flex-shrink:0}
    .circle-btn.plus{background:var(--red);border-color:var(--red)}
    .circle-btn:disabled{opacity:.3}
    .qty-picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:60;display:flex;align-items:flex-end;justify-content:center}
    .qty-picker{background:#0f0f11;border:1px solid rgba(220,38,38,.3);border-radius:20px 20px 0 0;width:100%;max-width:420px;padding:16px;padding-bottom:28px}
    .qty-picker-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#a1a1aa;text-align:center;margin-bottom:14px}
    .qty-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .qty-opt{padding:16px 6px;border-radius:14px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);font-size:20px;font-weight:900;color:#fff;text-align:center}
    .qty-opt.selected{background:var(--red);border-color:var(--red)}

    /* SHOP ROW */
    .shop-row{background:var(--card);border:1px solid rgba(245,158,11,.3);border-radius:16px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px}
    .shop-name{font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
    .shop-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .pending-badge{font-size:10px;font-weight:700;text-transform:uppercase;padding:4px 10px;border-radius:20px;background:rgba(245,158,11,.12);color:var(--amber);border:1px solid rgba(245,158,11,.3)}

    /* ADD FORM */
    .add-form{background:rgba(255,255,255,.03);border:1px solid rgba(220,38,38,.25);border-radius:16px;padding:12px 14px;margin-bottom:8px}
    .add-form input{width:100%;background:#18181b;border:1px solid #3f3f46;border-radius:10px;padding:10px 12px;font-size:14px;color:#fff;margin-bottom:8px}
    .add-form input::placeholder{color:#52525b}
    .add-form input:focus{border-color:rgba(220,38,38,.5)}
    .add-form-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .btn-cancel{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);border-radius:10px;padding:10px;font-size:11px;font-weight:700;text-transform:uppercase;color:#d4d4d8}
    .btn-add{background:var(--red);border-radius:10px;padding:10px;font-size:11px;font-weight:700;text-transform:uppercase;color:#fff}
    .add-dashed{width:100%;border:1px dashed rgba(255,255,255,.15);border-radius:16px;padding:12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#52525b;display:flex;align-items:center;justify-content:center;gap:6px;background:none;margin-top:4px}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
    .modal{background:#0f0f11;border:1px solid rgba(220,38,38,.3);border-radius:20px;width:100%;max-width:380px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden}
    .modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
    .modal-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
    .modal-close{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:16px;color:#a1a1aa}
    .modal-body{overflow-y:auto;flex:1}
    .modal-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px}
    .modal-row-name{font-weight:600;color:#e4e4e7}
    .modal-row-sub{color:#71717a;font-size:11px;margin-top:2px}
    .modal-delta-pos{color:var(--green);font-weight:700}
    .modal-delta-neg{color:#f87171;font-weight:700}
    .modal-footer{padding:12px 16px;flex-shrink:0}
    .btn-full{width:100%;border-radius:10px;padding:11px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
    .btn-full.red{background:var(--red);color:#fff}
    .btn-full.ghost{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#d4d4d8}
    .modal-pre{font-size:11px;color:#d4d4d8;white-space:pre-wrap;font-family:monospace;line-height:1.6;padding:12px 16px}
    .empty-msg{text-align:center;color:#71717a;font-size:13px;padding:32px 16px}

    /* LOADER */
    #loader{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:99}
    .spinner{width:32px;height:32px;border:3px solid rgba(220,38,38,.3);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    .hidden{display:none!important}
    pb16{padding-bottom:64px}
  </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<!-- HEADER -->
<div id="header">
  <div class="logo-row">
    <div class="logo">🔥 B'<span>LIVE</span></div>
    <button class="lang-btn" onclick="toggleLang()">🌐 <span id="lang-label">PT</span></button>
  </div>
  <div class="subtitle" id="txt-subtitle">Stock · Staff</div>
  <div class="section-title" id="txt-section">Essências de Chicha</div>
  <div class="red-bar"></div>
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label" id="txt-flavors">Sabores</div>
    </div>
    <div class="stat amber" id="stat-restock-box">
      <div class="stat-num" id="stat-restock">0</div>
      <div class="stat-label" id="txt-restock">A repor</div>
    </div>
  </div>
</div>

<!-- NAV -->
<div id="nav">
  <button class="nav-btn" id="btn-filter" onclick="toggleFilter()">
    <span id="txt-filter">Ver tudo</span>
  </button>
  <button class="nav-btn" onclick="openModal('history')">
    🕘 <span id="txt-history">Histórico</span>
  </button>
  <button class="nav-btn red" onclick="openModal('share')">
    🔗 <span id="txt-share">Lista do dia</span>
  </button>
</div>

<!-- BODY -->
<div style="padding-bottom:40px">

  <!-- SHOPPING LIST (collapsible, first) -->
  <div class="section" id="shop-section">
    <div class="collapse-header" onclick="toggleShop()">
      <div class="collapse-title">
        🛒 <span id="txt-shop-title">Lista de Compras</span>
        <span class="collapse-count" id="shop-count">(0)</span>
      </div>
      <span id="shop-chevron">▾</span>
    </div>
    <div id="shop-list" class="hidden"></div>
    <div id="shop-add-area" class="hidden">
      <div id="shop-add-form" class="hidden">
        <div class="add-form">
          <input id="shop-name-input" type="text" placeholder="Nome / Nombre" autocomplete="off"/>
          <div class="add-form-btns">
            <button class="btn-cancel" onclick="cancelAddShop()" id="txt-shop-cancel">Cancelar</button>
            <button class="btn-add" onclick="confirmAddShop()" id="txt-shop-add">Adicionar</button>
          </div>
        </div>
      </div>
      <button class="add-dashed" onclick="showShopForm()" id="btn-add-shop">📦 <span id="txt-add-item">Adicionar item</span></button>
    </div>
  </div>

  <!-- FLAVOR SECTION -->
  <div class="section">
    <div id="flavor-list"></div>
    <div id="flavor-add-form" class="hidden">
      <div class="add-form">
        <input id="flavor-name-input" type="text" placeholder="Nome / Nombre" autocomplete="off"/>
        <input id="flavor-qty-input" type="number" inputmode="numeric" placeholder="Quantidade inicial" style="margin-bottom:0"/>
        <div class="add-form-btns" style="margin-top:8px">
          <button class="btn-cancel" onclick="cancelAddFlavor()" id="txt-flavor-cancel">Cancelar</button>
          <button class="btn-add" onclick="confirmAddFlavor()" id="txt-flavor-add">Adicionar</button>
        </div>
      </div>
    </div>
    <button class="add-dashed" id="btn-add-flavor" onclick="showFlavorForm()">📦 <span id="txt-add-flavor">Adicionar sabor</span></button>
  </div>

</div>

<!-- MODALS -->
<div class="modal-overlay hidden" id="modal-history">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">🕘 <span id="txt-modal-history">Histórico</span></div>
      <button class="modal-close" onclick="closeModal('history')">✕</button>
    </div>
    <div class="modal-body" id="history-body"></div>
  </div>
</div>

<div class="modal-overlay hidden" id="modal-share">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">🔗 <span id="txt-modal-share">Lista do dia</span></div>
      <button class="modal-close" onclick="closeModal('share')">✕</button>
    </div>
    <div class="modal-body"><pre class="modal-pre" id="share-text"></pre></div>
    <div class="modal-footer">
      <button class="btn-full red" onclick="copyShare()" id="btn-copy">🔗 Copiar texto</button>
    </div>
  </div>
</div>

<div class="qty-picker-overlay hidden" id="qty-picker-overlay" onclick="if(event.target===this)closeQtyPicker()">
  <div class="qty-picker">
    <div class="qty-picker-title" id="qty-picker-title"></div>
    <div class="qty-grid" id="qty-grid"></div>
  </div>
</div>

<script>
  // ── Firebase ──────────────────────────────────────────
  firebase.initializeApp({
    apiKey: "AIzaSyDNipTXXyosjqu17x9jOcGKdK3Q-r1etRE",
    authDomain: "chicha-stoke.firebaseapp.com",
    projectId: "chicha-stoke",
    storageBucket: "chicha-stoke.firebasestorage.app",
    messagingSenderId: "672701965332",
    appId: "1:672701965332:web:fec7d0e8f3b4ea6679f301"
  });
  const db = firebase.firestore();
  const DOC = db.collection('blive_stock').doc('main');

  // ── State ─────────────────────────────────────────────
  let data = null;
  let lang = 'pt';
  let filterLow = false;
  let shopOpen = false;

  const SEED_ITEMS = [
    'KIZZ','A WAY','DRAGAN CODE','BLUE KIZZ','LOVE 66','MI AMOR','BERLIM',
    'BANAS','SWISS BOOM','BAKU NIGHTS','MOSCOW EVENINGS','ISS LIE ON THE ROCKS',
    'NO WOMAN NO CRY','RIO KIZZ','TWO YELLOW','RHAPSODY','L. KILL'
  ];
  const SEED_SHOP = ['Carvão','Filtros','Papel alumínio','Mangueiras','Piteiras'];

  function seedData() {
    return {
      items: SEED_ITEMS.map((name,i) => ({id:'item_'+i, name, qty:5, min:1})),
      shopItems: SEED_SHOP.map((name,i) => ({id:'shop_'+i, name})),
      movements: [],
    };
  }

  // ── i18n ──────────────────────────────────────────────
  const T = {
    pt: {
      subtitle:'Stock · Staff', section:'Essências de Chicha', shopTitle:'Lista de Compras',
      flavors:'Sabores', restock:'A repor', filterAll:'Ver tudo', filterLow:'Stock baixo',
      history:'Histórico', share:'Lista do dia', addFlavor:'Adicionar sabor',
      addItem:'Adicionar item', cancel:'Cancelar', add:'Adicionar',
      low:'Pouco stock', out:'Sem stock', min:'mín',
      shareAvail:'DISPONÍVEIS', shareUnavail:'NÃO DISPONÍVEIS',
      lowTag:'pouco stock', noStock:'sem stock', copy:'Copiar texto', copied:'Copiado!',
      noMov:'Ainda sem movimentos.', pending:'Pendente', empty:'Tudo OK por agora 👌',
      shareNote:'Lista para o grupo de WhatsApp',
    },
    es: {
      subtitle:'Stock · Staff', section:'Esencias de Chicha', shopTitle:'Lista de Compras',
      flavors:'Sabores', restock:'Para reponer', filterAll:'Ver todo', filterLow:'Stock bajo',
      history:'Historial', share:'Lista del día', addFlavor:'Añadir sabor',
      addItem:'Añadir item', cancel:'Cancelar', add:'Añadir',
      low:'Poco stock', out:'Sin stock', min:'mín',
      shareAvail:'DISPONIBLES', shareUnavail:'NO DISPONIBLES',
      lowTag:'poco stock', noStock:'sin stock', copy:'Copiar texto', copied:'¡Copiado!',
      noMov:'Sin movimientos todavía.', pending:'Pendiente', empty:'Todo OK por ahora 👌',
      shareNote:'Lista para el grupo de WhatsApp',
    }
  };
  function t(k){ return T[lang][k] || k; }

  function toggleLang(){
    lang = lang === 'pt' ? 'es' : 'pt';
    document.getElementById('lang-label').textContent = lang.toUpperCase();
    applyTexts();
    render();
  }

  function applyTexts(){
    document.getElementById('txt-subtitle').textContent = t('subtitle');
    document.getElementById('txt-section').textContent = t('section');
    document.getElementById('txt-flavors').textContent = t('flavors');
    document.getElementById('txt-restock').textContent = t('restock');
    document.getElementById('txt-filter').textContent = filterLow ? t('filterLow') : t('filterAll');
    document.getElementById('txt-history').textContent = t('history');
    document.getElementById('txt-share').textContent = t('share');
    document.getElementById('txt-shop-title').textContent = t('shopTitle');
    document.getElementById('txt-add-flavor').textContent = t('addFlavor');
    document.getElementById('txt-add-item').textContent = t('addItem');
    document.getElementById('txt-shop-cancel').textContent = t('cancel');
    document.getElementById('txt-shop-add').textContent = t('add');
    document.getElementById('txt-flavor-cancel').textContent = t('cancel');
    document.getElementById('txt-flavor-add').textContent = t('add');
    document.getElementById('txt-modal-history').textContent = t('history');
    document.getElementById('txt-modal-share').textContent = t('share');
  }

  // ── Persist ───────────────────────────────────────────
  async function persist(next){
    data = next;
    render();
    await DOC.set(next);
  }

  // ── Status ────────────────────────────────────────────
  function statusOf(item){
    if(item.qty <= 0) return 'out';
    if(item.qty <= item.min) return 'low';
    return 'ok';
  }

  // ── Render ────────────────────────────────────────────
  function render(){
    if(!data) return;
    const items = data.items || [];
    const shopItems = data.shopItems || [];
    const restockNeeded = items.filter(it => it.qty <= it.min);

    // stats
    document.getElementById('stat-total').textContent = items.length;
    document.getElementById('stat-restock').textContent = restockNeeded.length;

    // filter btn
    const filterBtn = document.getElementById('btn-filter');
    filterBtn.className = 'nav-btn' + (filterLow ? ' active' : '');
    document.getElementById('txt-filter').textContent = filterLow ? t('filterLow') : t('filterAll');

    // shop count
    document.getElementById('shop-count').textContent = '(' + shopItems.length + ')';

    // shop list
    const shopList = document.getElementById('shop-list');
    if(shopOpen){
      shopList.classList.remove('hidden');
      document.getElementById('shop-add-area').classList.remove('hidden');
      document.getElementById('shop-chevron').textContent = '▴';
      shopList.innerHTML = shopItems.length === 0 ? '<div class="empty-msg">'+t('empty')+'</div>' :
        shopItems.map(item => `
          <div class="shop-row">
            <div class="shop-name">${item.name}</div>
            <div class="shop-right">
              <span class="pending-badge">${t('pending')}</span>
              <button class="trash-btn" onclick="removeShop('${item.id}')">🗑️</button>
            </div>
          </div>
        `).join('');
    } else {
      shopList.classList.add('hidden');
      document.getElementById('shop-add-area').classList.add('hidden');
      document.getElementById('shop-chevron').textContent = '▾';
    }

    // flavor list
    const visible = filterLow ? items.filter(it => it.qty <= it.min) : items;
    const flavorList = document.getElementById('flavor-list');
    if(visible.length === 0){
      flavorList.innerHTML = '<div class="empty-msg">'+t('empty')+'</div>';
    } else {
      flavorList.innerHTML = visible.map(item => {
        const s = statusOf(item);
        const rowClass = 'item-row' + (s==='out'?' out':s==='low'?' low':'');
        const nameClass = 'item-name' + (s==='out'?' out':s==='low'?' low':'');
        const badge = s==='low' ? `<span class="badge low">${t('low')}</span>` :
                      s==='out' ? `<span class="badge out">${t('out')}</span>` : '';
        const qtyColor = s==='out'?'color:#f87171':s==='low'?'color:var(--amber)':'color:#fff';
        return `
          <div class="${rowClass}">
            <div class="item-left">
              <div class="${nameClass}">${item.name} ${badge}</div>
              <div class="item-meta">
                <div class="min-row">
                  <span>${t('min')} ${item.min}</span>
                  <button class="mini-btn" onclick="bumpMin('${item.id}',-1)">−</button>
                  <button class="mini-btn" onclick="bumpMin('${item.id}',1)">+</button>
                </div>
                <button class="trash-btn" onclick="removeFlavor('${item.id}')">🗑️</button>
              </div>
            </div>
            <div class="qty-controls">
              <button class="circle-btn" onclick="stepQty('${item.id}',-0.5)" ${item.qty<=0?'disabled':''}>−</button>
              <div class="qty-num" style="${qtyColor}" onclick="openQtyPicker('${item.id}')">${fmtQty(item.qty)}</div>
              <button class="circle-btn plus" onclick="stepQty('${item.id}',0.5)">+</button>
            </div>
          </div>
        `;
      }).join('');
    }
  }

  function fmtQty(q){
    const whole = Math.floor(q);
    const half = (q - whole) === 0.5;
    if(!half) return String(whole);
    return whole > 0 ? whole + '½' : '½';
  }

  // ── Actions ───────────────────────────────────────────
  function toggleFilter(){
    filterLow = !filterLow;
    render();
  }

  function toggleShop(){
    shopOpen = !shopOpen;
    render();
  }

  async function stepQty(id, d){
    const item = data.items.find(it=>it.id===id);
    const newQty = Math.max(0, Math.round((item.qty + d) * 2) / 2);
    const items = data.items.map(it => it.id===id ? {...it, qty:newQty} : it);
    const movements = [{
      id:'mv_'+Date.now(), itemName:item.name, delta:d, ts:new Date().toISOString()
    }, ...(data.movements||[])].slice(0,100);
    await persist({...data, items, movements});
  }

  let qtyPickerItemId = null;
  function openQtyPicker(id){
    qtyPickerItemId = id;
    const item = data.items.find(it=>it.id===id);
    document.getElementById('qty-picker-title').textContent = item.name;
    const options = [0,0.5,1,1.5,2,2.5,3,3.5,4,4.5,5,5.5];
    const grid = document.getElementById('qty-grid');
    grid.innerHTML = options.map(v => `
      <button class="qty-opt${v===item.qty?' selected':''}" onclick="pickQty(${v})">${fmtQty(v)}</button>
    `).join('');
    document.getElementById('qty-picker-overlay').classList.remove('hidden');
  }
  function closeQtyPicker(){
    document.getElementById('qty-picker-overlay').classList.add('hidden');
    qtyPickerItemId = null;
  }
  async function pickQty(v){
    const id = qtyPickerItemId;
    closeQtyPicker();
    if(!id) return;
    const item = data.items.find(it=>it.id===id);
    if(item.qty === v) return;
    const d = v - item.qty;
    const items = data.items.map(it => it.id===id ? {...it, qty:v} : it);
    const movements = [{
      id:'mv_'+Date.now(), itemName:item.name, delta:d, ts:new Date().toISOString()
    }, ...(data.movements||[])].slice(0,100);
    await persist({...data, items, movements});
  }

  async function bumpMin(id, d){
    const items = data.items.map(it => it.id===id ? {...it, min:Math.max(0,it.min+d)} : it);
    await persist({...data, items});
  }

  async function removeFlavor(id){
    const items = data.items.filter(it=>it.id!==id);
    await persist({...data, items});
  }

  async function removeShop(id){
    const shopItems = data.shopItems.filter(it=>it.id!==id);
    await persist({...data, shopItems});
  }

  // Add flavor
  function showFlavorForm(){
    document.getElementById('flavor-add-form').classList.remove('hidden');
    document.getElementById('btn-add-flavor').classList.add('hidden');
    document.getElementById('flavor-name-input').focus();
  }
  function cancelAddFlavor(){
    document.getElementById('flavor-add-form').classList.add('hidden');
    document.getElementById('btn-add-flavor').classList.remove('hidden');
    document.getElementById('flavor-name-input').value='';
    document.getElementById('flavor-qty-input').value='';
  }
  async function confirmAddFlavor(){
    const name = document.getElementById('flavor-name-input').value.trim().toUpperCase();
    const qty = Math.max(0, parseInt(document.getElementById('flavor-qty-input').value)||0);
    if(!name) return;
    const items = [...data.items, {id:'item_'+Date.now(), name, qty, min:1}];
    await persist({...data, items});
    cancelAddFlavor();
  }

  // Add shop
  function showShopForm(){
    document.getElementById('shop-add-form').classList.remove('hidden');
    document.getElementById('btn-add-shop').classList.add('hidden');
    document.getElementById('shop-name-input').focus();
  }
  function cancelAddShop(){
    document.getElementById('shop-add-form').classList.add('hidden');
    document.getElementById('btn-add-shop').classList.remove('hidden');
    document.getElementById('shop-name-input').value='';
  }
  async function confirmAddShop(){
    const name = document.getElementById('shop-name-input').value.trim().toUpperCase();
    if(!name) return;
    const shopItems = [...(data.shopItems||[]), {id:'shop_'+Date.now(), name}];
    await persist({...data, shopItems});
    cancelAddShop();
  }

  // ── Modals ────────────────────────────────────────────
  function openModal(type){
    if(type==='history'){
      const body = document.getElementById('history-body');
      const movs = data.movements||[];
      body.innerHTML = movs.length===0
        ? '<div class="empty-msg">'+t('noMov')+'</div>'
        : movs.slice(0,30).map(mv=>`
            <div class="modal-row">
              <div>
                <div class="modal-row-name">${mv.itemName}</div>
                <div class="modal-row-sub">${new Date(mv.ts).toLocaleString(lang==='pt'?'pt-PT':'es-ES')}</div>
              </div>
              <span class="${mv.delta>0?'modal-delta-pos':'modal-delta-neg'}">${mv.delta>0?'+'+mv.delta:mv.delta}</span>
            </div>
          `).join('');
    }
    if(type==='share'){
      const items = data.items||[];
      const ok = items.filter(it=>it.qty>0);
      const no = items.filter(it=>it.qty<=0);
      let txt = `🔥 B'LIVE LOUNGE BAR — ${t('section').toUpperCase()}\n`;
      txt += new Date().toLocaleString(lang==='pt'?'pt-PT':'es-ES')+'\n\n';
      txt += `✅ ${t('shareAvail')} (${ok.length})\n`;
      ok.forEach(it=>{ txt+=`• ${it.name}${it.qty<=it.min?' ⚠️ '+t('lowTag'):''}\n`; });
      txt += `\n❌ ${t('shareUnavail')} (${no.length})\n`;
      no.forEach(it=>{ txt+=`• ${it.name} (${t('noStock')})\n`; });
      document.getElementById('share-text').textContent = txt;
      document.getElementById('btn-copy').textContent = '🔗 '+t('copy');
    }
    document.getElementById('modal-'+type).classList.remove('hidden');
  }

  function closeModal(type){
    document.getElementById('modal-'+type).classList.add('hidden');
  }

  function copyShare(){
    const txt = document.getElementById('share-text').textContent;
    navigator.clipboard.writeText(txt).then(()=>{
      document.getElementById('btn-copy').textContent = '✓ '+t('copied');
      setTimeout(()=>{ document.getElementById('btn-copy').textContent='🔗 '+t('copy'); },2000);
    });
  }

  // ── Init ──────────────────────────────────────────────
  DOC.onSnapshot(snap => {
    if(snap.exists){
      const d = snap.data();
      if(!d.shopItems) d.shopItems = [];
      if(!d.movements) d.movements = [];
      data = d;
    } else {
      data = seedData();
      DOC.set(data);
    }
    document.getElementById('loader').classList.add('hidden');
    applyTexts();
    render();
  }, err => {
    document.getElementById('loader').innerHTML = '<div style="color:#f87171;padding:20px;text-align:center">Error conectando. Recarga la página.</div>';
  });
</script>
</body>
</html>
