    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0c" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
      html, body, #root { margin: 0; padding: 0; background-color: #000; }
      .animate-spin { animation: spin 1s linear infinite; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyDNipTXXyosjqu17x9jOcGKdK3Q-r1etRE",
        authDomain: "chicha-stoke.firebaseapp.com",
        projectId: "chicha-stoke",
        storageBucket: "chicha-stoke.firebasestorage.app",
        messagingSenderId: "672701965332",
        appId: "1:672701965332:web:fec7d0e8f3b4ea6679f301"
      };
      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();
    </script>
    <script type="text/babel" data-presets="react">

    const { useState, useEffect, useCallback } = React;

    function Icon({ n, size = 16, className = '' }) {
      const map = {
        flame: '🔥', plus: '+', minus: '−', alert: '⚠️', share: '🔗',
        check: '✓', x: '✕', history: '🕘', lang: '🌐', bell: '🔔',
        bellOff: '🔕', trash: '🗑️', cart: '🛒', pkg: '📦', mega: '📢',
        chevDown: '▾', chevUp: '▴',
      };
      if (n === 'loader') {
        return (
          <span
            className={className}
            style={{
              display: 'inline-block', width: size, height: size,
              border: '2px solid currentColor', borderTopColor: 'transparent',
              borderRadius: '50%',
            }}
          />
        );
      }
      const isBold = n === 'plus' || n === 'minus';
      return (
        <span
          className={className}
          style={{
            fontSize: size, lineHeight: 1, display: 'inline-flex',
            alignItems: 'center', justifyContent: 'center',
            fontWeight: isBold ? 900 : 'normal', fontStyle: 'normal',
          }}
        >
          {map[n] || '•'}
        </span>
      );
    }

    const SEED_NAMES = [
      'KIZZ', 'A WAY', 'DRAGAN CODE', 'BLUE KIZZ', 'LOVE 66', 'MI AMOR', 'BERLIM',
      'BANAS', 'SWISS BOOM', 'BAKU NIGHTS', 'MOSCOW EVENINGS', 'ISS LIE ON THE ROCKS',
      'NO WOMAN NO CRY', 'RIO KIZZ', 'TWO YELLOW', 'RHAPSODY', 'L. KILL',
    ];

    const SHOP_SEED_NAMES = ['Carvão', 'Filtros', 'Papel alumínio', 'Mangueiras', 'Piteiras'];

    const STORAGE_KEY = 'blive-shisha-stock-v3';
    const DEFAULT_MIN = 1;

    const T = {
      pt: {
        section: 'Essências de Chicha',
        shopSection: 'Lista de Compras',
        subtitle: 'Stock · Staff',
        flavors: 'Sabores',
        low: 'Pouco stock',
        out: 'Sem stock',
        needsRestock: 'A repor',
        showAll: 'Ver tudo',
        showLow: 'A mostrar: stock baixo',
        history: 'Histórico',
        share: 'Lista do dia',
        min: 'mín',
        shareTitle: "Lista para o grupo",
        shareAvail: 'DISPONÍVEIS',
        shareUnavail: 'NÃO DISPONÍVEIS',
        lowTag: 'pouco stock',
        noStockTag: 'sem stock',
        copy: 'Copiar texto',
        copied: 'Copiado!',
        shareNote: 'Cola este texto no grupo de WhatsApp do staff para que todos saibam o que vender hoje.',
        movements: 'Últimos movimentos',
        noMovements: 'Ainda sem movimentos.',
        empty: 'Tudo com stock acima do mínimo. 👌',
        minLevel: 'Nível mínimo',
        addFlavor: 'Adicionar sabor',
        addItem: 'Adicionar item',
        pending: 'Pendente',
        namePlaceholder: 'Nome',
        qtyPlaceholder: 'Qtd inicial',
        add: 'Adicionar',
        cancel: 'Cancelar',
        deleteConfirm: 'Eliminar',
        notifyOn: 'Avisos ativados',
        notifyOff: 'Avisos desativados',
        notifyToggleHint: 'Só quem ativar isto recebe os avisos da caixa abaixo.',
        notify: 'Avisar',
        notified: 'Avisado',
        alertsTitle: 'Avisos pendentes',
        noAlerts: 'Sem avisos pendentes.',
        clearAlerts: 'Limpar avisos',
        shoppingCollapsed: 'Toca para ver a lista de compras',
        sendRestockAlert: 'Avisar quem compra',
        restockSent: 'Aviso enviado!',
        restockAlertGroup: (n) => `Stock a repor (${n} itens)`,
        allGood: 'Tudo OK por agora',
      },
      es: {
        section: 'Esencias de Chicha',
        shopSection: 'Lista de Compras',
        subtitle: 'Stock · Staff',
        flavors: 'Sabores',
        low: 'Poco stock',
        out: 'Sin stock',
        needsRestock: 'Para reponer',
        showAll: 'Ver todo',
        showLow: 'Mostrando: stock bajo',
        history: 'Historial',
        share: 'Lista del día',
        min: 'mín',
        shareTitle: 'Lista para el grupo',
        shareAvail: 'DISPONIBLES',
        shareUnavail: 'NO DISPONIBLES',
        lowTag: 'poco stock',
        noStockTag: 'sin stock',
        copy: 'Copiar texto',
        copied: '¡Copiado!',
        shareNote: 'Pega este texto en el grupo de WhatsApp del staff para que todos sepan qué vender hoy.',
        movements: 'Últimos movimientos',
        noMovements: 'Sin movimientos todavía.',
        empty: 'Todo con stock por encima del mínimo. 👌',
        minLevel: 'Nivel mínimo',
        addFlavor: 'Añadir sabor',
        addItem: 'Añadir item',
        pending: 'Pendiente',
        namePlaceholder: 'Nombre',
        qtyPlaceholder: 'Cant. inicial',
        add: 'Añadir',
        cancel: 'Cancelar',
        deleteConfirm: 'Eliminar',
        notifyOn: 'Avisos activados',
        notifyOff: 'Avisos desactivados',
        notifyToggleHint: 'Solo quien active esto recibe los avisos de la bandeja de abajo.',
        notify: 'Avisar',
        notified: 'Avisado',
        alertsTitle: 'Avisos pendientes',
        noAlerts: 'Sin avisos pendientes.',
        clearAlerts: 'Limpiar avisos',
        shoppingCollapsed: 'Toca para ver la lista de compras',
        sendRestockAlert: 'Avisar al comprador',
        restockSent: '¡Aviso enviado!',
        restockAlertGroup: (n) => `Stock para reponer (${n} items)`,
        allGood: 'Todo OK por ahora',
      },
    };

    function seedData() {
      return {
        items: SEED_NAMES.map((name, i) => ({
          id: 'item_' + i,
          name,
          qty: 5,
          min: DEFAULT_MIN,
        })),
        shopItems: SHOP_SEED_NAMES.map((name, i) => ({
          id: 'shop_' + i,
          name,
        })),
        movements: [],
        alerts: [],
        notifyEnabled: false,
      };
    }

    function App() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [filterLow, setFilterLow] = useState(false);
      const [showShare, setShowShare] = useState(false);
      const [showHistory, setShowHistory] = useState(false);
      const [showAlerts, setShowAlerts] = useState(false);
      const [showAddFlavor, setShowAddFlavor] = useState(false);
      const [showAddShop, setShowAddShop] = useState(false);
      const [newName, setNewName] = useState('');
      const [newQty, setNewQty] = useState('5');
      const [copied, setCopied] = useState(false);
      const [lang, setLang] = useState('pt');
      const [savingId, setSavingId] = useState(null);
      const [justNotified, setJustNotified] = useState({});
      const [showShopping, setShowShopping] = useState(false);
      const [restockSent, setRestockSent] = useState(false);

      const t = T[lang];

      useEffect(() => {
        const ref = db.collection('blive_stock').doc('main');
        const unsub = ref.onSnapshot((snap) => {
          if (snap.exists) {
            const parsed = snap.data();
            if (!parsed.shopItems) parsed.shopItems = seedData().shopItems;
            if (!parsed.alerts) parsed.alerts = [];
            if (parsed.notifyEnabled === undefined) parsed.notifyEnabled = false;
            if (!parsed.items) parsed.items = seedData().items;
            if (!parsed.movements) parsed.movements = [];
            setData(parsed);
          } else {
            const seed = seedData();
            ref.set(seed);
            setData(seed);
          }
          setLoading(false);
        }, (e) => {
          setError('—');
          setLoading(false);
        });
        return () => unsub();
      }, []);

      const persist = useCallback(async (next) => {
        setData(next);
        try {
          await db.collection('blive_stock').doc('main').set(next);
          setError(null);
        } catch (e) {
          setError('—');
        }
      }, []);

      if (loading) {
        return (
          <div className="min-h-screen bg-black flex items-center justify-center">
            <Icon n="loader" className="animate-spin text-red-500" size={32} />
          </div>
        );
      }

      const statusOf = (it) => (it.qty <= 0 ? 'out' : it.qty <= it.min ? 'low' : 'ok');
      const lowCount = data.items.filter((it) => it.qty <= it.min).length;
      const outCount = data.items.filter((it) => it.qty <= 0).length;
      const pendingAlerts = data.alerts || [];

      const applyDelta = async (list, item, delta) => {
        if (delta === 0) return;
        setSavingId(item.id);
        const newQty = Math.max(0, item.qty + delta);
        const key = list === 'items' ? 'items' : 'shopItems';
        const next = {
          ...data,
          [key]: data[key].map((it) => (it.id === item.id ? { ...it, qty: newQty } : it)),
          movements: [
            {
              id: 'mv_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
              itemName: item.name,
              delta,
              ts: new Date().toISOString(),
            },
            ...data.movements,
          ].slice(0, 100),
        };
        await persist(next);
        setSavingId(null);
      };

      const bumpMin = async (list, item, delta) => {
        const key = list === 'items' ? 'items' : 'shopItems';
        const next = {
          ...data,
          [key]: data[key].map((it) => (it.id === item.id ? { ...it, min: Math.max(0, it.min + delta) } : it)),
        };
        await persist(next);
      };

      const removeItem = async (list, item) => {
        const key = list === 'items' ? 'items' : 'shopItems';
        const next = { ...data, [key]: data[key].filter((it) => it.id !== item.id) };
        await persist(next);
      };

      const addItem = async (list) => {
        const name = newName.trim();
        if (!name) return;
        const qty = list === 'items' ? Math.max(0, parseInt(newQty, 10) || 0) : 0;
        const key = list === 'items' ? 'items' : 'shopItems';
        const prefix = list === 'items' ? 'item_' : 'shop_';
        const next = {
          ...data,
          [key]: [
            ...data[key],
            { id: prefix + Date.now(), name: name.toUpperCase(), qty, min: DEFAULT_MIN },
          ],
        };
        await persist(next);
        setNewName('');
        setNewQty('5');
        setShowAddFlavor(false);
        setShowAddShop(false);
      };

      const toggleNotify = async () => {
        const next = { ...data, notifyEnabled: !data.notifyEnabled };
        await persist(next);
      };

      const sendAlert = async (item) => {
        const next = {
          ...data,
          alerts: [
            {
              id: 'al_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
              itemName: item.name,
              qty: item.qty,
              ts: new Date().toISOString(),
            },
            ...pendingAlerts,
          ].slice(0, 50),
        };
        await persist(next);
        setJustNotified((m) => ({ ...m, [item.id]: true }));
        setTimeout(() => setJustNotified((m) => ({ ...m, [item.id]: false })), 2500);
      };

      const clearAlerts = async () => {
        await persist({ ...data, alerts: [] });
      };

      const restockNeeded = data.items.filter((it) => it.qty <= it.min);

      const sendRestockAlert = async () => {
        if (restockNeeded.length === 0) return;
        const next = {
          ...data,
          alerts: [
            {
              id: 'al_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
              itemName: t.restockAlertGroup(restockNeeded.length),
              items: restockNeeded.map((it) => `${it.name} (${it.qty}/${it.min})`),
              qty: restockNeeded.length,
              ts: new Date().toISOString(),
            },
            ...pendingAlerts,
          ].slice(0, 50),
        };
        await persist(next);
        setRestockSent(true);
        setTimeout(() => setRestockSent(false), 2500);
      };

      const visibleItems = filterLow ? data.items.filter((it) => it.qty <= it.min) : data.items;

      const shareText = () => {
        const ok = data.items.filter((it) => it.qty > 0);
        const no = data.items.filter((it) => it.qty <= 0);
        let txt = `🔥 B'LIVE LOUNGE BAR — ${t.section.toUpperCase()}\n${new Date().toLocaleString(lang === 'pt' ? 'pt-PT' : 'es-ES')}\n\n`;
        txt += `✅ ${t.shareAvail} (${ok.length})\n`;
        ok.forEach((it) => {
          const tag = it.qty <= it.min ? `  ⚠️ ${t.lowTag}` : '';
          txt += `• ${it.name}${tag}\n`;
        });
        txt += `\n❌ ${t.shareUnavail} (${no.length})\n`;
        no.forEach((it) => {
          txt += `• ${it.name} (${t.noStockTag})\n`;
        });
        return txt;
      };

      const handleCopy = async () => {
        try {
          await navigator.clipboard.writeText(shareText());
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch (e) {}
      };

      const Row = ({ item, list }) => {
        const status = statusOf(item);
        const ringColor =
          status === 'out' ? 'border-red-600/50' : status === 'low' ? 'border-amber-500/40' : 'border-white/[0.06]';
        const isSaving = savingId === item.id;
        return (
          <div className={`rounded-2xl bg-white/[0.025] border ${ringColor} px-3.5 py-3 flex items-center justify-between gap-3 transition-colors`}>
            <div className="min-w-0 flex-1">
              <div className="flex items-center gap-2 flex-wrap">
                <h3 className={`font-bold uppercase tracking-wide truncate ${list === 'items' ? 'text-xl' : 'text-sm'}`}>{item.name}</h3>
                {status === 'low' && (
                  <span className="text-[10px] font-bold uppercase px-1.5 py-0.5 rounded bg-amber-500/15 text-amber-400 border border-amber-500/30 shrink-0">
                    {t.low}
                  </span>
                )}
                {status === 'out' && (
                  <span className="text-[10px] font-bold uppercase px-1.5 py-0.5 rounded bg-red-600/20 text-red-400 border border-red-600/40 shrink-0">
                    {t.out}
                  </span>
                )}
              </div>
              {list !== 'items' && (
              <div className="flex items-center gap-2 mt-1.5 flex-wrap">
                <span className="text-[10px] text-zinc-500">{t.min} {item.min}</span>
                <button onClick={() => bumpMin(list, item, -1)} className="text-[10px] text-zinc-600 w-4 h-4 rounded bg-white/[0.04] flex items-center justify-center">−</button>
                <button onClick={() => bumpMin(list, item, 1)} className="text-[10px] text-zinc-600 w-4 h-4 rounded bg-white/[0.04] flex items-center justify-center">+</button>

                <button
                  onClick={() => removeItem(list, item)}
                  className="ml-auto text-zinc-600 active:text-red-500 p-1"
                  aria-label={t.deleteConfirm}
                >
                  <Icon n="trash" size={13} />
                </button>
              </div>
              )}
              {list === 'items' && (
                <button
                  onClick={() => removeItem(list, item)}
                  className="mt-1 text-zinc-600 active:text-red-500 p-1"
                  aria-label={t.deleteConfirm}
                >
                  <Icon n="trash" size={13} />
                </button>
              )}
            </div>

            <div className="flex items-center gap-2.5 shrink-0">
              <button
                onClick={() => applyDelta(list, item, -1)}
                disabled={isSaving || item.qty <= 0}
                className="w-9 h-9 rounded-full bg-white/[0.05] border border-white/10 flex items-center justify-center active:bg-white/10 disabled:opacity-30"
              >
                <Icon n="minus" size={16} />
              </button>
              <span
                className={`text-2xl font-black tabular-nums w-8 text-center ${
                  status === 'out' ? 'text-red-500' : status === 'low' ? 'text-amber-400' : 'text-white'
                }`}
              >
                {item.qty}
              </span>
              <button
                onClick={() => applyDelta(list, item, 1)}
                disabled={isSaving}
                className="w-9 h-9 rounded-full bg-red-600 flex items-center justify-center active:bg-red-700"
              >
                {isSaving ? <Icon n="loader" size={16} className="animate-spin" /> : <Icon n="plus" size={16} />}
              </button>
            </div>
          </div>
        );
      };

      const ShopRow = ({ item }) => (
        <div className="rounded-2xl bg-white/[0.025] border border-amber-500/30 px-3.5 py-3 flex items-center justify-between gap-3">
          <h3 className="font-bold uppercase text-sm tracking-wide truncate min-w-0">{item.name}</h3>
          <div className="flex items-center gap-2 shrink-0">
            <span className="text-[10px] font-bold uppercase px-2 py-1 rounded-full bg-amber-500/15 text-amber-400 border border-amber-500/30">
              {t.pending}
            </span>
            <button
              onClick={() => removeItem('shop', item)}
              className="text-zinc-600 active:text-red-500 p-1"
              aria-label={t.deleteConfirm}
            >
              <Icon n="trash" size={15} />
            </button>
          </div>
        </div>
      );

      const AddForm = ({ list, onClose }) => (
        <div className="rounded-2xl bg-white/[0.03] border border-red-900/30 px-3.5 py-3 space-y-2">
          <div className="flex gap-2">
            <input
              autoFocus
              type="text"
              placeholder={t.namePlaceholder}
              value={newName}
              onChange={(e) => setNewName(e.target.value)}
              className="flex-[2] bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-white placeholder:text-zinc-500 focus:outline-none focus:border-red-500"
            />
            {list === 'items' && (
            <input
              type="number"
              inputMode="numeric"
              placeholder={t.qtyPlaceholder}
              value={newQty}
              onChange={(e) => setNewQty(e.target.value)}
              className="flex-1 bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-white placeholder:text-zinc-500 focus:outline-none focus:border-red-500"
            />
            )}
          </div>
          <div className="flex gap-2">
            <button
              onClick={onClose}
              className="flex-1 text-xs font-semibold uppercase rounded-lg py-2 bg-white/[0.05] border border-white/[0.08] text-zinc-300"
            >
              {t.cancel}
            </button>
            <button
              onClick={() => addItem(list)}
              className="flex-1 text-xs font-semibold uppercase rounded-lg py-2 bg-red-600 text-white"
            >
              {t.add}
            </button>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-black text-zinc-100 font-sans">
          {/* Header */}
          <div
            className="relative px-5 pt-8 pb-5 border-b border-red-900/30"
            style={{
              background: 'radial-gradient(ellipse 120% 80% at 50% 0%, rgba(220,38,38,0.28), transparent 60%), #0a0a0c',
            }}
          >
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-2">
                <Icon n="flame" className="text-red-500" size={22} />
                <h1 className="text-2xl font-black tracking-tight uppercase">
                  B'<span className="text-red-500">LIVE</span>
                </h1>
              </div>
              <div className="flex items-center gap-2">
                <button
                  onClick={() => setShowAlerts(true)}
                  className="relative w-9 h-9 rounded-full bg-white/[0.05] border border-white/10 flex items-center justify-center active:bg-white/10"
                >
                  <Icon n="bell" size={15} className="text-zinc-300" />
                  {pendingAlerts.length > 0 && (
                    <span className="absolute -top-1 -right-1 min-w-[16px] h-4 px-1 rounded-full bg-red-600 text-[10px] font-bold flex items-center justify-center">
                      {pendingAlerts.length}
                    </span>
                  )}
                </button>
                <button
                  onClick={() => setLang((l) => (l === 'pt' ? 'es' : 'pt'))}
                  className="flex items-center gap-1.5 text-xs font-bold uppercase tracking-wide rounded-full px-3 py-1.5 bg-white/[0.05] border border-white/10 active:bg-white/10"
                >
                  <Icon n="lang" size={13} className="text-red-500" />
                  {lang.toUpperCase()}
                </button>
              </div>
            </div>
            <p className="text-xs uppercase tracking-[0.2em] text-zinc-400 mt-1 ml-8">{t.subtitle}</p>

            <div className="mt-5">
              <h2 className="text-lg font-black uppercase tracking-wide text-white">{t.section}</h2>
              <div className="h-0.5 w-12 bg-red-600 mt-1.5 rounded-full" />
            </div>

            <div className="flex gap-3 mt-4">
              <div className="flex-1 rounded-xl bg-white/[0.03] border border-white/[0.06] px-3 py-2.5">
                <div className="text-2xl font-bold tabular-nums">{data.items.length}</div>
                <div className="text-[11px] text-zinc-500 uppercase tracking-wide">{t.flavors}</div>
              </div>
              <button
                onClick={sendRestockAlert}
                disabled={restockNeeded.length === 0}
                className={`flex-[1.6] rounded-xl border px-3 py-2.5 text-left transition-colors ${
                  restockNeeded.length === 0
                    ? 'bg-white/[0.03] border-white/[0.06]'
                    : restockSent
                    ? 'bg-emerald-500/10 border-emerald-500/30'
                    : 'bg-amber-500/[0.08] border-amber-500/25 active:bg-amber-500/15'
                }`}
              >
                <div className="flex items-center justify-between">
                  <div className={`text-2xl font-bold tabular-nums ${restockNeeded.length === 0 ? 'text-zinc-400' : 'text-amber-400'}`}>
                    {restockNeeded.length}
                  </div>
                  {restockNeeded.length > 0 && (
                    <Icon n="mega" size={15} className={restockSent ? 'text-emerald-400' : 'text-amber-400'} />
                  )}
                </div>
                <div className={`text-[11px] uppercase tracking-wide ${restockNeeded.length === 0 ? 'text-zinc-500' : 'text-amber-400/80'}`}>
                  {restockNeeded.length === 0 ? t.allGood : restockSent ? t.restockSent : `${t.needsRestock} · ${t.sendRestockAlert}`}
                </div>
              </button>
            </div>

            {/* Notify switch */}
            <button
              onClick={toggleNotify}
              className={`mt-4 w-full flex items-center justify-between rounded-xl px-3.5 py-2.5 border transition-colors ${
                data.notifyEnabled ? 'bg-emerald-500/10 border-emerald-500/30' : 'bg-white/[0.03] border-white/[0.08]'
              }`}
            >
              <div className="flex items-center gap-2">
                {data.notifyEnabled ? <Icon n="bell" size={15} className="text-emerald-400" /> : <Icon n="bellOff" size={15} className="text-zinc-500" />}
                <div className="text-left">
                  <div className={`text-xs font-bold uppercase ${data.notifyEnabled ? 'text-emerald-400' : 'text-zinc-300'}`}>
                    {data.notifyEnabled ? t.notifyOn : t.notifyOff}
                  </div>
                </div>
              </div>
              <div className={`w-10 h-6 rounded-full flex items-center px-0.5 transition-colors ${data.notifyEnabled ? 'bg-emerald-500/40' : 'bg-white/10'}`}>
                <div className={`w-5 h-5 rounded-full bg-white transition-transform ${data.notifyEnabled ? 'translate-x-4' : ''}`} />
              </div>
            </button>
            <p className="text-[10px] text-zinc-500 mt-1.5 px-1">{t.notifyToggleHint}</p>
          </div>

          {error && (
            <div className="mx-4 mt-3 px-3 py-2 rounded-lg bg-red-950/60 border border-red-800 text-xs text-red-300 flex items-center gap-2">
              <Icon n="alert" size={14} /> {error}
            </div>
          )}

          {/* Actions */}
          <div className="px-4 py-3 grid grid-cols-3 gap-2 sticky top-0 z-10 backdrop-blur-md bg-black/80 border-b border-white/[0.04]">
            <button
              onClick={() => setFilterLow((f) => !f)}
              className={`text-[11px] font-semibold uppercase tracking-wide rounded-lg py-2.5 border transition-colors ${
                filterLow ? 'bg-amber-500/15 border-amber-500/40 text-amber-300' : 'bg-white/[0.03] border-white/[0.08] text-zinc-300'
              }`}
            >
              {filterLow ? t.showLow : t.showAll}
            </button>
            <button
              onClick={() => setShowHistory(true)}
              className="text-[11px] font-semibold uppercase tracking-wide rounded-lg py-2.5 bg-white/[0.03] border border-white/[0.08] text-zinc-300 flex items-center justify-center gap-1.5 active:bg-white/[0.08]"
            >
              <Icon n="history" size={13} /> {t.history}
            </button>
            <button
              onClick={() => setShowShare(true)}
              className="text-[11px] font-semibold uppercase tracking-wide rounded-lg py-2.5 bg-red-600 text-white flex items-center justify-center gap-1.5 active:bg-red-700 transition-colors"
            >
              <Icon n="share" size={13} /> {t.share}
            </button>
          </div>

          {/* Shopping list section - collapsible, shown first */}
          <div className="px-4 py-3">
            <button
              onClick={() => setShowShopping((s) => !s)}
              className="w-full flex items-center justify-between mb-2"
            >
              <div className="flex items-center gap-2">
                <Icon n="cart" size={16} className="text-red-500" />
                <h2 className="text-base font-black uppercase tracking-wide text-white">{t.shopSection}</h2>
                <span className="text-[11px] text-zinc-500 tabular-nums">({data.shopItems.length})</span>
              </div>
              {showShopping ? <Icon n="chevUp" size={16} className="text-zinc-400" /> : <Icon n="chevDown" size={16} className="text-zinc-400" />}
            </button>
            <div className="h-0.5 w-12 bg-red-600 mb-3 rounded-full" />

            {showShopping ? (
              <div className="space-y-2">
                {data.shopItems.map((item) => <ShopRow key={item.id} item={item} />)}

                {showAddShop ? (
                  <AddForm list="shop" onClose={() => { setShowAddShop(false); setNewName(''); setNewQty('5'); }} />
                ) : (
                  <button
                    onClick={() => setShowAddShop(true)}
                    className="w-full flex items-center justify-center gap-2 text-xs font-bold uppercase tracking-wide rounded-2xl py-3 border border-dashed border-white/15 text-zinc-400 active:bg-white/[0.03]"
                  >
                    <Icon n="pkg" size={15} /> {t.addItem}
                  </button>
                )}
              </div>
            ) : (
              <button
                onClick={() => setShowShopping(true)}
                className="w-full text-center text-xs text-zinc-500 rounded-xl py-3 border border-white/[0.06] bg-white/[0.02] active:bg-white/[0.04]"
              >
                {t.shoppingCollapsed}
              </button>
            )}
          </div>

          {/* Flavor list */}
          <div className="px-4 py-3 pb-10">
            <h2 className="text-lg font-black uppercase tracking-wide text-white">{t.section}</h2>
            <div className="h-0.5 w-12 bg-red-600 mt-1.5 mb-3 rounded-full" />

            <div className="space-y-2">
              {visibleItems.length === 0 && !showAddFlavor && (
                <div className="text-center text-zinc-500 text-sm py-6">{t.empty}</div>
              )}
              {visibleItems.map((item) => <Row key={item.id} item={item} list="items" />)}

              {showAddFlavor ? (
                <AddForm list="items" onClose={() => { setShowAddFlavor(false); setNewName(''); setNewQty('5'); }} />
              ) : (
                <button
                  onClick={() => setShowAddFlavor(true)}
                  className="w-full flex items-center justify-center gap-2 text-xs font-bold uppercase tracking-wide rounded-2xl py-3 border border-dashed border-white/15 text-zinc-400 active:bg-white/[0.03]"
                >
                  <Icon n="pkg" size={15} /> {t.addFlavor}
                </button>
              )}
            </div>
          </div>

          {/* Alerts modal */}
          {showAlerts && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
              <div className="bg-zinc-950 border border-red-900/40 rounded-2xl w-full max-w-sm max-h-[75vh] flex flex-col overflow-hidden">
                <div className="flex items-center justify-between px-4 py-3 border-b border-white/[0.06] shrink-0">
                  <h2 className="font-bold uppercase text-sm tracking-wide flex items-center gap-2">
                    <Icon n="bell" size={15} className="text-red-500" /> {t.alertsTitle}
                  </h2>
                  <button onClick={() => setShowAlerts(false)} className="text-zinc-500">
                    <Icon n="x" size={18} />
                  </button>
                </div>
                <div className="divide-y divide-white/[0.04] overflow-y-auto">
                  {pendingAlerts.length === 0 && (
                    <div className="text-center text-zinc-500 text-sm py-8">{t.noAlerts}</div>
                  )}
                  {pendingAlerts.map((al) => (
                    <div key={al.id} className="px-4 py-2.5 text-xs">
                      <div className="flex items-center justify-between">
                        <div className="flex items-center gap-2 min-w-0">
                          <Icon n="mega" size={13} className="text-red-500 shrink-0" />
                          <div className="min-w-0">
                            <div className="font-semibold text-zinc-200 truncate">{al.itemName}</div>
                            <div className="text-zinc-500 text-[11px]">
                              {new Date(al.ts).toLocaleString(lang === 'pt' ? 'pt-PT' : 'es-ES')}
                            </div>
                          </div>
                        </div>
                        {!al.items && <span className="font-bold tabular-nums text-amber-400 shrink-0 ml-2">{al.qty}</span>}
                      </div>
                      {al.items && (
                        <ul className="mt-1.5 ml-5 space-y-0.5">
                          {al.items.map((line, i) => (
                            <li key={i} className="text-amber-400/90 text-[11px]">• {line}</li>
                          ))}
                        </ul>
                      )}
                    </div>
                  ))}
                </div>
                {pendingAlerts.length > 0 && (
                  <div className="px-4 pb-4 pt-1 shrink-0">
                    <button
                      onClick={clearAlerts}
                      className="w-full text-xs font-semibold uppercase rounded-lg py-2.5 bg-white/[0.05] border border-white/[0.08] text-zinc-300"
                    >
                      {t.clearAlerts}
                    </button>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* History modal */}
          {showHistory && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
              <div className="bg-zinc-950 border border-red-900/40 rounded-2xl w-full max-w-sm max-h-[75vh] flex flex-col overflow-hidden">
                <div className="flex items-center justify-between px-4 py-3 border-b border-white/[0.06] shrink-0">
                  <h2 className="font-bold uppercase text-sm tracking-wide flex items-center gap-2">
                    <Icon n="history" size={15} className="text-red-500" /> {t.movements}
                  </h2>
                  <button onClick={() => setShowHistory(false)} className="text-zinc-500">
                    <Icon n="x" size={18} />
                  </button>
                </div>
                <div className="divide-y divide-white/[0.04] overflow-y-auto">
                  {data.movements.length === 0 && (
                    <div className="text-center text-zinc-500 text-sm py-8">{t.noMovements}</div>
                  )}
                  {data.movements.slice(0, 30).map((mv) => (
                    <div key={mv.id} className="flex items-center justify-between px-4 py-2.5 text-xs">
                      <div className="min-w-0">
                        <div className="font-semibold text-zinc-300 truncate">{mv.itemName}</div>
                        <div className="text-zinc-500 text-[11px]">
                          {new Date(mv.ts).toLocaleString(lang === 'pt' ? 'pt-PT' : 'es-ES')}
                        </div>
                      </div>
                      <span className={`font-bold tabular-nums shrink-0 ml-2 ${mv.delta > 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                        {mv.delta > 0 ? `+${mv.delta}` : mv.delta}
                      </span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* Share modal */}
          {showShare && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
              <div className="bg-zinc-950 border border-red-900/40 rounded-2xl w-full max-w-sm max-h-[75vh] flex flex-col overflow-hidden">
                <div className="flex items-center justify-between px-4 py-3 border-b border-white/[0.06] shrink-0">
                  <h2 className="font-bold uppercase text-sm tracking-wide flex items-center gap-2">
                    <Icon n="share" size={15} className="text-red-500" /> {t.shareTitle}
                  </h2>
                  <button onClick={() => setShowShare(false)} className="text-zinc-500">
                    <Icon n="x" size={18} />
                  </button>
                </div>
                <pre className="text-xs text-zinc-300 whitespace-pre-wrap px-4 py-3 font-mono leading-relaxed overflow-y-auto">
                  {shareText()}
                </pre>
                <div className="px-4 pb-4 flex gap-2 shrink-0">
                  <button
                    onClick={handleCopy}
                    className="flex-1 text-xs font-semibold uppercase rounded-lg py-2.5 bg-red-600 text-white flex items-center justify-center gap-1.5"
                  >
                    {copied ? <Icon n="check" size={14} /> : <Icon n="share" size={14} />}
                    {copied ? t.copied : t.copy}
                  </button>
                </div>
                <p className="text-[11px] text-zinc-500 px-4 pb-4 -mt-2 shrink-0">{t.shareNote}</p>
              </div>
            </div>
          )}
        </div>
      );
    }


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    </script>
  </body>
</html>
